<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yllowtap — Login</title>
<link rel="stylesheet" href="./css/style.css">
<style>
.auth-page {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:var(--header-height,88px) 20px 40px; background:var(--bg-main,#F7F5F2);
}
.auth-box {
  width:100%; max-width:400px; padding:48px 36px;
  background:#fff; border:1px solid #E5E1DC;
}
.auth-logo {
  font-family:'Bodoni Moda',serif; font-size:28px; font-weight:400;
  text-align:center; margin-bottom:8px;
}
.auth-logo span { background:#F4D84E; padding:2px 6px; }
.auth-subtitle {
  text-align:center; font-size:12px; color:#888; letter-spacing:0.1em;
  margin-bottom:36px;
}
.auth-tabs {
  display:flex; border-bottom:1px solid #E5E1DC; margin-bottom:28px;
}
.auth-tab {
  flex:1; padding:12px 0; text-align:center;
  font-size:12px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase;
  color:#888; cursor:pointer; border-bottom:2px solid transparent;
  background:none; border-top:none; border-left:none; border-right:none;
  font-family:inherit; transition:all 0.3s;
}
.auth-tab.active { color:#111; border-bottom-color:#111; }
.auth-panel { display:none; }
.auth-panel.active { display:block; }

/* Social Buttons */
.social-btns { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
.social-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; height:48px; border:none; border-radius:4px;
  font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;
  transition:opacity 0.2s;
}
.social-btn:hover { opacity:0.85; }
.social-btn-kakao { background:#FEE500; color:#000; }
.social-btn-naver { background:#03C75A; color:#fff; }
.social-btn img { width:20px; height:20px; }

.auth-divider {
  display:flex; align-items:center; gap:16px; margin:24px 0;
  font-size:11px; color:#aaa; letter-spacing:0.1em;
}
.auth-divider::before, .auth-divider::after {
  content:''; flex:1; height:1px; background:#E5E1DC;
}

/* Form */
.auth-field { margin-bottom:16px; }
.auth-label {
  display:block; font-size:11px; font-weight:500; letter-spacing:0.1em;
  color:#666; margin-bottom:6px; text-transform:uppercase;
}
.auth-input {
  width:100%; padding:12px 14px; font-size:14px; font-family:inherit;
  border:1px solid #E5E1DC; background:#F7F5F2; color:#111;
  transition:border-color 0.2s;
}
.auth-input:focus { outline:none; border-color:#111; }
.auth-input::placeholder { color:#bbb; }

.auth-submit {
  width:100%; height:48px; margin-top:8px;
  font-size:12px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
  background:#111; color:#fff; border:none; cursor:pointer; font-family:inherit;
  transition:background 0.2s;
}
.auth-submit:hover { background:#333; }

.auth-error {
  background:#FFF0F0; border:1px solid #E8CCCC; color:#C4453C;
  padding:10px 14px; font-size:12px; margin-bottom:16px;
  display:none; border-radius:2px;
}
.auth-error.show { display:block; }

.auth-success {
  background:#F0FFF4; border:1px solid #C6E8D0; color:#2D7A4F;
  padding:10px 14px; font-size:12px; margin-bottom:16px;
  display:none; border-radius:2px;
}
.auth-success.show { display:block; }

.auth-footer {
  text-align:center; margin-top:24px; font-size:12px; color:#888;
}
.auth-footer a { color:#111; font-weight:500; text-decoration:underline; }
.auth-footer a:hover { opacity:0.7; }

/* Agree checkboxes */
.auth-agree { margin-top:20px; margin-bottom:8px; }
.auth-agree-item {
  display:flex; align-items:center; gap:8px;
  margin-bottom:8px; cursor:pointer;
}
.auth-agree-item input[type="checkbox"] {
  width:16px; height:16px; accent-color:#111; cursor:pointer; flex-shrink:0;
}
.auth-agree-item label {
  font-size:13px; color:#444; cursor:pointer; line-height:1.4;
}
.auth-agree-item label span {
  color:#888; font-size:11px;
}
.auth-agree-divider {
  height:1px; background:#E5E1DC; margin:12px 0;
}

/* Logged in state */
.auth-logged {
  text-align:center; display:none;
}
.auth-logged-name {
  font-family:'Bodoni Moda',serif; font-size:22px; margin-bottom:8px;
}
.auth-logged-email { font-size:13px; color:#888; margin-bottom:28px; }
.auth-logged-btns { display:flex; flex-direction:column; gap:10px; }
.auth-logged-btn {
  display:block; padding:14px; font-size:12px; font-weight:500;
  letter-spacing:0.15em; text-transform:uppercase; text-align:center;
  border:1px solid #E5E1DC; color:#111; text-decoration:none;
  font-family:inherit; cursor:pointer; background:none; transition:all 0.2s;
}
.auth-logged-btn:hover { background:#111; color:#fff; border-color:#111; opacity:1; }
.auth-logout-btn {
  margin-top:16px; font-size:12px; color:#888; background:none;
  border:none; cursor:pointer; font-family:inherit; text-decoration:underline;
}
.auth-logout-btn:hover { color:#111; }

@media (max-width:480px) {
  .auth-box { padding:36px 24px; }
  .auth-logo { font-size:24px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header__logo">
    <a href="/" style="text-decoration:none;color:inherit;">
      <span class="header__logo-highlight">Yllowtap</span>
    </a>
  </div>
  <nav class="header__nav">
    <a href="/category.html?cat=best">Best</a><a href="/category.html?cat=new">New In</a>
    <a href="/category.html?cat=bags">Bags</a><a href="/category.html?cat=jewelry">Jewelry</a>

  <a href="/category.html?cat=bags">Bags</a><a href="/category.html?cat=jewelry">Jewelry</a>
  <a href="/category.html?cat=accessories">Accessories</a><a href="/category.html?cat=keyring">Keyring</a>
  <a href="/category.html?cat=seasonal">Seasonal</a><a href="/category.html?cat=sale">Sale</a>
  <a href="/login.html">Login</a><a href="/mypage.html?tab=wishlist">Wishlist</a>
</div>

<!-- AUTH PAGE -->
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo"><span>Yllowtap</span></div>
    <div class="auth-subtitle">Join the quiet luxury experience</div>

    <!-- 로그인 상태 -->
    <div class="auth-logged" id="authLogged">
      <div class="auth-logged-name" id="loggedName"></div>
      <div class="auth-logged-email" id="loggedEmail"></div>
      <div class="auth-logged-btns">
        <a href="/" class="auth-logged-btn">쇼핑하러 가기</a>
        <a href="/mypage.html" class="auth-logged-btn">마이페이지</a>
      </div>
      <button class="auth-logout-btn" onclick="doLogout()">로그아웃</button>
    </div>

    <!-- 비로그인 상태 -->
    <div id="authForms">
      <!-- 탭 -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">로그인</button>
        <button class="auth-tab" onclick="switchTab('signup')">회원가입</button>
      </div>

      <!-- 소셜 로그인 -->
      <div class="social-btns">
        <button class="social-btn social-btn-kakao" onclick="socialLogin('kakao')">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 3C6.48 3 2 6.58 2 10.94c0 2.8 1.86 5.27 4.66 6.67-.15.53-.96 3.41-.99 3.63 0 0-.02.17.09.24.11.06.24.01.24.01.32-.04 3.7-2.44 4.28-2.85.56.08 1.14.12 1.72.12 5.52 0 10-3.58 10-7.94S17.52 3 12 3z" fill="#000"/></svg>
          카카오로 시작하기
        </button>
        <button class="social-btn social-btn-naver" onclick="socialLogin('naver')">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M16.27 3H7.73A4.73 4.73 0 003 7.73v8.54A4.73 4.73 0 007.73 21h8.54A4.73 4.73 0 0021 16.27V7.73A4.73 4.73 0 0016.27 3zm.46 12.6l-3.34-4.82v4.82h-2.78V8.4h2.92l3.34 4.82V8.4h2.78v7.2h-2.92z" fill="#fff"/></svg>
          네이버로 시작하기
        </button>
      </div>

      <div class="auth-divider">또는</div>

      <!-- 로그인 패널 -->
      <div class="auth-panel active" id="panel-login">
        <div class="auth-error" id="loginError"></div>
        <div class="auth-field">
          <label class="auth-label">이메일</label>
          <input class="auth-input" id="loginEmail" type="email" placeholder="your@email.com">
        </div>
        <div class="auth-field">
          <label class="auth-label">비밀번호</label>
          <input class="auth-input" id="loginPw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')emailLogin()">
        </div>
        <button class="auth-submit" onclick="emailLogin()">로그인</button>
        <div class="auth-footer">
          <a href="/forgot-password.html">비밀번호를 잊으셨나요?</a>
        </div>
        <div class="auth-footer" style="margin-top:6px;">
          계정이 없으신가요? <a href="#" onclick="switchTab('signup');return false;">회원가입</a>
        </div>
      </div>

      <!-- 회원가입 패널 -->
      <div class="auth-panel" id="panel-signup">
        <div class="auth-error" id="signupError"></div>
        <div class="auth-success" id="signupSuccess"></div>
        <div class="auth-field">
          <label class="auth-label">이름</label>
          <input class="auth-input" id="signupName" type="text" placeholder="홍길동">
        </div>
        <div class="auth-field">
          <label class="auth-label">이메일</label>
          <input class="auth-input" id="signupEmail" type="email" placeholder="your@email.com">
        </div>
        <div class="auth-field">
          <label class="auth-label">비밀번호</label>
          <input class="auth-input" id="signupPw" type="password" placeholder="8자 이상">
        </div>
        <div class="auth-field">
          <label class="auth-label">비밀번호 확인</label>
          <input class="auth-input" id="signupPw2" type="password" placeholder="비밀번호를 다시 입력" onkeydown="if(event.key==='Enter')emailSignup()">
        </div>

        <!-- 약관 동의 -->
        <div class="auth-agree">
          <div class="auth-agree-item">
            <input type="checkbox" id="agreeAll" onchange="toggleAllAgree(this.checked)">
            <label for="agreeAll" style="font-weight:600;">전체 동의</label>
          </div>
          <div class="auth-agree-divider"></div>
          <div class="auth-agree-item">
            <input type="checkbox" id="agreeTerms" onchange="checkAgreeAll()">
            <label for="agreeTerms"><a href="/terms.html" target="_blank" style="color:#111;text-decoration:underline;">이용약관</a> 동의 <span>(필수)</span></label>
          </div>
          <div class="auth-agree-item">
            <input type="checkbox" id="agreePrivacy" onchange="checkAgreeAll()">
            <label for="agreePrivacy"><a href="/privacy.html" target="_blank" style="color:#111;text-decoration:underline;">개인정보처리방침</a> 동의 <span>(필수)</span></label>
          </div>
          <div class="auth-agree-item">
            <input type="checkbox" id="agreeMarketing" onchange="checkAgreeAll()">
            <label for="agreeMarketing">마케팅 정보 수신 동의 <span>(선택)</span></label>
          </div>
          <div class="auth-agree-item">
            <input type="checkbox" id="agreeNotiEmail" checked onchange="checkAgreeAll()">
            <label for="agreeNotiEmail">이메일 알림 수신 <span>(선택 · 주문/배송 안내)</span></label>
          </div>
          <div class="auth-agree-item" id="kakaoNotiWrap" style="display:none;">
            <input type="checkbox" id="agreeNotiKakao" onchange="checkAgreeAll()">
            <label for="agreeNotiKakao">카카오 알림톡 수신 <span>(선택 · 준비 중)</span></label>
        </div>
        </div>

        <button class="auth-submit" onclick="emailSignup()">회원가입</button>
        <div class="auth-footer">
          이미 계정이 있으신가요? <a href="#" onclick="switchTab('login');return false;">로그인</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://ppihvvpplqikclftrwdb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwaWh2dnBwbHFpa2NsZnRyd2RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzE0NTEsImV4cCI6MjA5NTMwNzQ1MX0.shGVcFTQiuYc4u6tdU50x18YMgJdgFUljf8c7QlQU-U';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.auth-tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  document.querySelectorAll('.auth-error, .auth-success').forEach(e => e.classList.remove('show'));
}

// ── 전체 동의 / 개별 체크 ──
function toggleAllAgree(checked) {
  ['agreeTerms','agreePrivacy','agreeMarketing','agreeNotiEmail','agreeNotiKakao'].forEach(id => {
    document.getElementById(id).checked = checked;
  });
}
function checkAgreeAll() {
  const all = ['agreeTerms','agreePrivacy','agreeMarketing','agreeNotiEmail','agreeNotiKakao']
    .every(id => document.getElementById(id).checked);
  document.getElementById('agreeAll').checked = all;
}

// ── 소셜 로그인 ──
async function socialLogin(provider) {
  const r = new URLSearchParams(window.location.search).get('redirect');
  const options = {
    redirectTo: window.location.origin + '/login.html' + (r ? ('?redirect=' + encodeURIComponent(r)) : '')
  };

  if (provider === 'naver') {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'custom:naver',
      options
    });
    if (error) { showError('loginError', error.message); }
  } else {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'kakao',
      options: {
        ...options,
        scopes: 'profile_nickname'
      }
    });
    if (error) { showError('loginError', error.message); }
  }
}

// ── 이메일 로그인 ──
async function emailLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (!email || !pw) { showError('loginError', '이메일과 비밀번호를 입력해주세요.'); return; }

  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    showError('loginError', '이메일 또는 비밀번호가 올바르지 않습니다.');
  } else {
    checkAuth();
  }
}

// ── 이메일 회원가입 ──
async function emailSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pw = document.getElementById('signupPw').value;
  const pw2 = document.getElementById('signupPw2').value;
  const agreeTerms = document.getElementById('agreeTerms').checked;
  const agreePrivacy = document.getElementById('agreePrivacy').checked;
  const agreeMarketing = document.getElementById('agreeMarketing').checked;
  const notiEmail = document.getElementById('agreeNotiEmail').checked;
  const notiKakao = document.getElementById('agreeNotiKakao').checked;

  if (!name) { showError('signupError', '이름을 입력해주세요.'); return; }
  if (!email) { showError('signupError', '이메일을 입력해주세요.'); return; }
  if (pw.length < 8 || !/[a-z]/.test(pw) || !/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)) { showError('signupError', '비밀번호는 8자 이상, 영문 소문자 + 특수문자를 포함해야 합니다.'); return; }
  if (pw !== pw2) { showError('signupError', '비밀번호가 일치하지 않습니다.'); return; }
  if (!agreeTerms) { showError('signupError', '이용약관에 동의해주세요.'); return; }
  if (!agreePrivacy) { showError('signupError', '개인정보처리방침에 동의해주세요.'); return; }

  const { data, error } = await sb.auth.signUp({
    email,
    password: pw,
    options: { data: { display_name: name } }
  });

  if (error) {
    showError('signupError', error.message);
    return;
  }

  // user_profiles에 약관 동의 + 알림 설정 저장
  if (data.user) {
    await sb.from('user_profiles').update({
      agreed_terms: agreeTerms,
      agreed_privacy: agreePrivacy,
      agreed_marketing: agreeMarketing,
      notification_email: notiEmail,
      notification_kakao: notiKakao
    }).eq('id', data.user.id);
  }

  document.getElementById('signupSuccess').textContent = '가입 완료! 로그인해주세요.';
  document.getElementById('signupSuccess').classList.add('show');
  document.getElementById('signupError').classList.remove('show');
}

// ── 로그아웃 ──
async function doLogout() {
  await sb.auth.signOut();
  window.location.reload();
}

// ── 로그인 후 돌아갈 주소 (같은 사이트 내부 경로만 허용) ──
function getRedirect() {
  const r = new URLSearchParams(window.location.search).get('redirect');
  // 외부 사이트로 튕기는 것 방지: '/'로 시작하고 '//'는 아닌 내부 경로만 허용
  return (r && /^\/(?!\/)/.test(r)) ? r : null;
}

// ── 인증 상태 체크 ──
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    // 로그인 상태 + 돌아갈 주소가 있으면 원래 자리로 복귀
    const dest = getRedirect();
    if (dest) { window.location.replace(dest); return; }
    const user = session.user;
    const name = user.user_metadata?.display_name || user.user_metadata?.name || user.user_metadata?.preferred_username || '회원';
    const email = user.email || '';
    document.getElementById('loggedName').textContent = `안녕하세요, ${name}님`;
    document.getElementById('loggedEmail').textContent = email;
    document.getElementById('authLogged').style.display = 'block';
    document.getElementById('authForms').style.display = 'none';
  } else {
    document.getElementById('authLogged').style.display = 'none';
    document.getElementById('authForms').style.display = 'block';
  }
}

// ── 에러 표시 ──
function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

// ── 초기화 ──
checkAuth();
</script>
<script src="./js/common-header.js"></script>
</body>
